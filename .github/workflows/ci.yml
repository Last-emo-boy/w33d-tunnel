name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Format Check
      run: bash ./tools/fmt.sh --check

    - name: Build All CLI Binaries (Host Platform)
      run: bash ./tools/build_binaries.sh dist

    - name: Core Test Profile
      run: bash ./tools/test_core.sh

    - name: Vet
      run: go vet ./...
