name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Build All CLI Binaries
      run: |
        GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} bash ./tools/build_binaries.sh dist

    - name: Generate Checksums
      run: |
        (cd dist && sha256sum * > SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }}.txt)

    - name: Assert No Task/TODO Docs In Artifacts
      run: |
        if find dist -maxdepth 1 -type f \( -name "TODO*" -o -name "*task*" -o -name "*.md" \) | grep -q .; then
          echo "unexpected doc files in dist"
          find dist -maxdepth 1 -type f
          exit 1
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/*

  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
